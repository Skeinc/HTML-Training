<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Формы и ошибки</title>
    <style>
        .error { color: #b91c1c; }
        input[aria-invalid="true"] { border: 2px solid #b91c1c; }
        fieldset { margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>Доступная форма</h1>

    <form action="#" method="post" novalidate>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required
            aria-invalid="true"
            aria-describedby="email-error">
        <p id="email-error" class="error" role="alert">
            <span aria-hidden="true">⚠</span>
            Введите адрес в формате name@example.com
        </p>

        <fieldset>
            <legend>Способ доставки</legend>
            <label><input type="radio" name="ship" value="pickup"> Самовывоз</label>
            <label><input type="radio" name="ship" value="courier" checked> Курьер</label>
        </fieldset>

        <button type="submit">Отправить</button>
    </form>
</body>
</html>
