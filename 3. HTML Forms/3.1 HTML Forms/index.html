<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Основы HTML-форм</title>
</head>
<body>
    <h1>Регистрация</h1>

    <form action="/register" method="post">
        <p>
            <label for="fname">Имя:</label><br>
            <input type="text" id="fname" name="fname" required>
        </p>

        <p>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
        </p>

        <fieldset>
            <legend>Любимый язык</legend>
            <label><input type="radio" name="lang" value="html"> HTML</label><br>
            <label><input type="radio" name="lang" value="css"> CSS</label><br>
            <label><input type="radio" name="lang" value="js"> JavaScript</label>
        </fieldset>

        <p>
            <label><input type="checkbox" name="notify" value="yes"> Получать рассылку</label>
        </p>

        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
